name: release

on:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: macos-latest
    outputs:
      should_release: ${{ steps.release.outputs.should_release }}
      version: ${{ steps.release.outputs.version }}
      commit: ${{ steps.release.outputs.commit }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide release version
        id: release
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail

          commit="${GITHUB_SHA}"

          first_line="$(printf '%s\n' "$HEAD_COMMIT_MESSAGE" | sed -n '1p')"
          if [[ ! "$first_line" =~ ^(feat|fix|chore)(\(.+\))?!?: ]]; then
            echo "No release tag created: head commit does not start with feat:, fix:, or chore:."
            echo "should_release=false" >>"$GITHUB_OUTPUT"
            echo "version=" >>"$GITHUB_OUTPUT"
            echo "commit=${commit}" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          latest="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
          if [[ -z "$latest" ]]; then
            next="v0.1.0"
          else
            version_no_v="${latest#v}"
            IFS=. read -r major minor patch <<<"$version_no_v"
            next="v${major}.${minor}.$((patch + 1))"
          fi

          if git rev-parse -q --verify "refs/tags/${next}" >/dev/null; then
            tagged_commit="$(git rev-list -n 1 "${next}")"
            if [[ "$tagged_commit" != "$commit" ]]; then
              echo "Tag ${next} already exists at ${tagged_commit}, not ${commit}."
              exit 1
            fi
            echo "Reusing existing tag ${next} for ${commit}."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "${next}" "${commit}"
            git push origin "refs/tags/${next}"
          fi

          echo "should_release=true" >>"$GITHUB_OUTPUT"
          echo "version=${next}" >>"$GITHUB_OUTPUT"
          echo "commit=${commit}" >>"$GITHUB_OUTPUT"

  build:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: macos-latest
            goarch: arm64
          - runner: macos-15-intel
            goarch: amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          CGO_ENABLED: 1
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          COMMIT="${{ needs.prepare.outputs.commit }}"
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build -trimpath -tags sqlite_fts5 \
            -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" \
            -o thr ./cmd/thr

      - name: Package
        run: tar czvf "thr_darwin_${{ matrix.goarch }}.tar.gz" thr

      - uses: actions/upload-artifact@v4
        with:
          name: dist-darwin-${{ matrix.goarch }}
          path: thr_darwin_${{ matrix.goarch }}.tar.gz

  smoke:
    needs:
      - prepare
      - build
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      fail-fast: true
      matrix:
        os:
          - macos-latest
          - macos-15-intel
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Install release verification tools
        run: brew list --versions minisign >/dev/null 2>&1 || brew install minisign

      - name: Generate checksums for smoke test
        env:
          # Generate with `minisign -G -W`; commit the matching public key in install.sh.
          THR_MINISIGN_SECRET_KEY: ${{ secrets.THR_MINISIGN_SECRET_KEY }}
        run: |
          cd dist
          shasum -a 256 thr_darwin_*.tar.gz > checksums.txt
          test -n "${THR_MINISIGN_SECRET_KEY}"
          printf '%s' "${THR_MINISIGN_SECRET_KEY}" > minisign.key
          chmod 600 minisign.key
          minisign -Sm checksums.txt -s minisign.key -x checksums.txt.minisig -W

      - name: Smoke test installer with built archives
        run: THR_INSTALL_TEST_BASE_URL="file://${GITHUB_WORKSPACE}/dist" bash scripts/installer_smoke.sh

  release:
    needs:
      - prepare
      - build
      - smoke
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Install release signing tools
        run: brew list --versions minisign >/dev/null 2>&1 || brew install minisign

      - name: Generate checksums
        env:
          # Generate with `minisign -G -W`; commit the matching public key in install.sh.
          THR_MINISIGN_SECRET_KEY: ${{ secrets.THR_MINISIGN_SECRET_KEY }}
        run: |
          cd dist
          shasum -a 256 thr_darwin_*.tar.gz | tee checksums.txt
          test -n "${THR_MINISIGN_SECRET_KEY}"
          printf '%s' "${THR_MINISIGN_SECRET_KEY}" > minisign.key
          chmod 600 minisign.key
          minisign -Sm checksums.txt -s minisign.key -x checksums.txt.minisig -W

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          target_commitish: ${{ needs.prepare.outputs.commit }}
          generate_release_notes: true
          files: |
            dist/thr_darwin_*.tar.gz
            dist/checksums.txt
            dist/checksums.txt.minisig
