name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: macos-latest
            goarch: arm64
          - runner: macos-15-intel
            goarch: amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          CGO_ENABLED: 1
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA}"
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build -trimpath -tags sqlite_fts5 \
            -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" \
            -o thr ./cmd/thr

      - name: Package
        run: tar czvf "thr_darwin_${{ matrix.goarch }}.tar.gz" thr

      - uses: actions/upload-artifact@v4
        with:
          name: dist-darwin-${{ matrix.goarch }}
          path: thr_darwin_${{ matrix.goarch }}.tar.gz

  smoke:
    needs: build
    strategy:
      fail-fast: true
      matrix:
        os:
          - macos-latest
          - macos-15-intel
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums for smoke test
        run: |
          cd dist
          shasum -a 256 thr_darwin_*.tar.gz > checksums.txt

      - name: Smoke test installer with built archives
        run: THR_INSTALL_TEST_BASE_URL="file://${GITHUB_WORKSPACE}/dist" bash scripts/installer_smoke.sh

  release:
    needs:
      - build
      - smoke
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 thr_darwin_*.tar.gz | tee checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/thr_darwin_*.tar.gz
            dist/checksums.txt
