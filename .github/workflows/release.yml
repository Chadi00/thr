name: release

on:
  workflow_run:
    workflows:
      - ci
    types:
      - completed
    branches:
      - master

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: macos-latest
    outputs:
      should_release: ${{ steps.release.outputs.should_release }}
      version: ${{ steps.release.outputs.version }}
      commit: ${{ steps.release.outputs.commit }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Decide release version
        id: release
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          commit="$HEAD_SHA"

          first_line="$(git log -1 --pretty=%s "$commit")"
          if [[ ! "$first_line" =~ ^(feat|fix|chore)(\(.+\))?!?: ]]; then
            echo "No release tag created: head commit does not start with feat:, fix:, or chore:."
            echo "should_release=false" >>"$GITHUB_OUTPUT"
            echo "version=" >>"$GITHUB_OUTPUT"
            echo "commit=${commit}" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          latest="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
          if [[ -z "$latest" ]]; then
            next="v0.1.0"
          else
            version_no_v="${latest#v}"
            IFS=. read -r major minor patch <<<"$version_no_v"
            next="v${major}.${minor}.$((patch + 1))"
          fi

          if git rev-parse -q --verify "refs/tags/${next}" >/dev/null; then
            tagged_commit="$(git rev-list -n 1 "${next}")"
            if [[ "$tagged_commit" != "$commit" ]]; then
              echo "Tag ${next} already exists at ${tagged_commit}, not ${commit}."
              exit 1
            fi
            echo "Reusing existing tag ${next} for ${commit}."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "${next}" "${commit}"
            git push origin "refs/tags/${next}"
          fi

          echo "should_release=true" >>"$GITHUB_OUTPUT"
          echo "version=${next}" >>"$GITHUB_OUTPUT"
          echo "commit=${commit}" >>"$GITHUB_OUTPUT"

  build:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: macos-latest
            goarch: arm64
          - runner: macos-15-intel
            goarch: amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.commit }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          CGO_ENABLED: 1
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          COMMIT="${{ needs.prepare.outputs.commit }}"
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build -trimpath -tags sqlite_fts5 \
            -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" \
            -o thr ./cmd/thr

      - name: Build ONNX Runtime for Intel macOS
        if: matrix.goarch == 'amd64'
        run: |
          set -euo pipefail
          git clone --recursive --depth 1 --branch v1.25.1 https://github.com/microsoft/onnxruntime.git "${RUNNER_TEMP}/onnxruntime"
          cd "${RUNNER_TEMP}/onnxruntime"
          ./build.sh --config Release --build_shared_lib --parallel --skip_tests --compile_no_warning_as_error
          ort_lib="$(find build -type f -name libonnxruntime.dylib | head -n 1)"
          test -n "$ort_lib"
          echo "THR_ONNXRUNTIME_LIB=${ort_lib}" >>"$GITHUB_ENV"
          echo "THR_ONNXRUNTIME_LICENSE_DIR=${RUNNER_TEMP}/onnxruntime" >>"$GITHUB_ENV"
          echo "THR_ONNXRUNTIME_SOURCE=ci-source-build" >>"$GITHUB_ENV"

      - name: Package
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          THR_RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          THR_RELEASE_COMMIT: ${{ needs.prepare.outputs.commit }}
          THR_PACKAGE_BINARY: thr
          THR_PACKAGE_OUT_DIR: dist
        run: bash scripts/package_release.sh

      - uses: actions/upload-artifact@v4
        with:
          name: dist-darwin-${{ matrix.goarch }}
          path: dist/thr_darwin_${{ matrix.goarch }}.tar.gz

  smoke:
    needs:
      - prepare
      - build
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      fail-fast: true
      matrix:
        os:
          - macos-latest
          - macos-15-intel
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.commit }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums for smoke test
        run: |
          set -euo pipefail
          ssh-keygen -q -t ed25519 -N '' -C 'thr-smoke' -f "${RUNNER_TEMP}/thr_smoke_signing_key"
          echo "THR_INSTALL_ALLOWED_SIGNERS=thr-release $(cat "${RUNNER_TEMP}/thr_smoke_signing_key.pub")" >>"$GITHUB_ENV"
          cd dist
          shasum -a 256 thr_darwin_*.tar.gz > checksums.txt
          ssh-keygen -Y sign -f "${RUNNER_TEMP}/thr_smoke_signing_key" -n thr-release checksums.txt >/dev/null 2>/dev/null

      - name: Smoke test installer with built archives
        run: THR_INSTALL_TEST_BASE_URL="file://${GITHUB_WORKSPACE}/dist" bash scripts/installer_smoke.sh

  release:
    needs:
      - prepare
      - build
      - smoke
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        env:
          # Must match THR_SSH_ALLOWED_SIGNERS in install.sh.
          THR_SSH_SIGNING_KEY: ${{ secrets.THR_SSH_SIGNING_KEY }}
        run: |
          set -euo pipefail
          cd dist
          shasum -a 256 thr_darwin_*.tar.gz | tee checksums.txt
          test -n "${THR_SSH_SIGNING_KEY}"
          printf '%s\n' "${THR_SSH_SIGNING_KEY}" > signing_key
          chmod 600 signing_key
          ssh-keygen -Y sign -f signing_key -n thr-release checksums.txt >/dev/null 2>/dev/null
          rm -f signing_key

      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/thr_darwin_*.tar.gz
            dist/checksums.txt
            dist/checksums.txt.sig

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          target_commitish: ${{ needs.prepare.outputs.commit }}
          generate_release_notes: true
          files: |
            dist/thr_darwin_*.tar.gz
            dist/checksums.txt
            dist/checksums.txt.sig
