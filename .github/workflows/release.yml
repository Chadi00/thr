name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
          - runner: macos-15-intel
            goos: darwin
            goarch: amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # ONNX Runtime: onnxruntime_go vendors C headers and dlopen()s the shared library at
      # runtime — no -dev package needed to compile. (Noble/24.04 also lacks libonnxruntime-dev
      # in default apt.) SQLite CGO needs libsqlite3-dev.
      - name: Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libsqlite3-dev

      - name: Build binary
        env:
          CGO_ENABLED: 1
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA}"
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build -trimpath -tags sqlite_fts5 \
            -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" \
            -o thr ./cmd/thr

      - name: Package
        run: tar czvf "thr_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz" thr

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: thr_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz

  smoke:
    needs: build
    strategy:
      fail-fast: true
      matrix:
        os:
          - ubuntu-22.04
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Build local release fixture
        shell: bash
        run: |
          set -euo pipefail
          case "$(uname -s)" in
            Darwin) goos=darwin ;;
            Linux) goos=linux ;;
            *) exit 1 ;;
          esac
          case "$(uname -m)" in
            x86_64|amd64) goarch=amd64 ;;
            arm64|aarch64) goarch=arm64 ;;
            *) exit 1 ;;
          esac
          archive="thr_${goos}_${goarch}.tar.gz"
          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum thr_*.tar.gz > checksums.txt)
          else
            (cd dist && shasum -a 256 thr_*.tar.gz > checksums.txt)
          fi
          cat > release.json <<EOF
          {
            "assets": [
              {
                "name": "${archive}",
                "browser_download_url": "file://${GITHUB_WORKSPACE}/dist/${archive}"
              },
              {
                "name": "checksums.txt",
                "browser_download_url": "file://${GITHUB_WORKSPACE}/dist/checksums.txt"
              }
            ]
          }
          EOF

      - name: Smoke test installer with built archive
        run: THR_SMOKE_RELEASE_JSON="file://${GITHUB_WORKSPACE}/release.json" bash scripts/installer_smoke.sh binary

  release:
    needs:
      - build
      - smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum thr_*.tar.gz | tee checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/thr_*.tar.gz
            dist/checksums.txt
