name: ci

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: shellcheck install.sh uninstall.sh scripts/installer_prompt_test.sh scripts/installer_smoke.sh scripts/package_release.sh scripts/update_model_assets.sh

  test:
    strategy:
      fail-fast: true
      matrix:
        os:
          - macos-latest
          - macos-15-intel
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify shell scripts parse
        run: bash -n install.sh uninstall.sh scripts/installer_prompt_test.sh scripts/installer_smoke.sh scripts/package_release.sh scripts/update_model_assets.sh

      - name: Run installer prompt tests
        run: bash scripts/installer_prompt_test.sh

      - name: Run Go tests
        run: go test ./...

  installer-smoke:
    strategy:
      fail-fast: true
      matrix:
        os:
          - macos-latest
          - macos-15-intel
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Run installer smoke test
        run: bash scripts/installer_smoke.sh
