name: ci

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: shellcheck install.sh uninstall.sh scripts/*.sh

  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify shell scripts parse
        run: bash -n install.sh uninstall.sh scripts/installer_prompt_test.sh scripts/installer_smoke.sh scripts/package_onnxruntime.sh scripts/package_release.sh scripts/package_release_fixture_test.sh scripts/update_model_assets.sh

      - name: Run installer prompt tests
        run: bash scripts/installer_prompt_test.sh

      - name: Run package fixture tests
        run: bash scripts/package_release_fixture_test.sh

      - name: Run Go tests
        run: go test ./...

  test-shipping-intel:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: macos-15-intel
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: go test ./...

  installer-smoke:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Run installer smoke test
        run: bash scripts/installer_smoke.sh

  installer-smoke-shipping-intel:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: macos-15-intel
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Run installer smoke test
        run: bash scripts/installer_smoke.sh
