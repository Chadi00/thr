name: ci

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  test:
    strategy:
      fail-fast: true
      matrix:
        os:
          - macos-latest
          - macos-15-intel
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify shell scripts parse
        run: bash -n install.sh uninstall.sh scripts/installer_smoke.sh

      - name: Run shellcheck
        run: |
          brew list --versions shellcheck >/dev/null 2>&1 || brew install shellcheck
          shellcheck install.sh uninstall.sh scripts/installer_smoke.sh

      - name: Run Go tests
        run: go test ./...

  installer-smoke:
    strategy:
      fail-fast: true
      matrix:
        os:
          - macos-latest
          - macos-15-intel
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Run installer smoke test
        run: bash scripts/installer_smoke.sh
